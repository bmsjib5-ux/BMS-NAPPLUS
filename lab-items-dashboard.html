<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lab Items Dashboard - BMS</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2128;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #7d8590;
    --primary: #1f6feb;
    --primary-glow: rgba(31,111,235,0.15);
    --success: #3fb950;
    --success-bg: rgba(63,185,80,0.1);
    --error: #f85149;
    --error-bg: rgba(248,81,73,0.1);
    --warn: #d29922;
    --warn-bg: rgba(210,153,34,0.1);
    --accent: #58a6ff;
    --teal: #39d353;
    --purple: #bc8cff;
    --orange: #ffa657;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Sarabun', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.6;
  }

  /* Header */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-logo { display: flex; align-items: center; gap: 10px; }
  .logo-shield {
    width: 28px; height: 28px;
    background: linear-gradient(135deg, #1f6feb, #58a6ff);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }
  .header h1 { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; white-space: nowrap; }
  .header-subtitle { font-size: 11px; color: var(--text-muted); padding: 2px 8px; background: var(--surface2); border-radius: 4px; }
  .header-spacer { flex: 1; }

  .user-info-bar {
    display: flex; align-items: center; gap: 8px;
    font-size: 11px; color: var(--text-muted);
    padding: 4px 10px; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 6px;
  }
  .user-info-bar.connected { background: var(--success-bg); border-color: rgba(63,185,80,0.2); }
  .user-info-bar .user-name { color: var(--success); font-weight: 600; }

  /* Session Bar */
  .session-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 24px;
    display: flex; align-items: center; gap: 12px;
  }
  .session-bar label { font-size: 12px; font-weight: 600; color: var(--text-muted); white-space: nowrap; }
  .session-bar input {
    flex: 1; max-width: 400px;
    background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
    padding: 6px 10px; color: var(--text);
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
  }
  .session-bar input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-glow); }
  .session-bar button {
    padding: 6px 16px; border-radius: 6px; border: 1px solid var(--primary);
    background: var(--primary-glow); color: var(--accent);
    font-size: 12px; font-weight: 600; cursor: pointer;
    font-family: 'Sarabun', sans-serif; transition: all 0.15s;
  }
  .session-bar button:hover { background: var(--primary); color: #fff; }
  .session-bar button.connected { border-color: var(--error); background: var(--error-bg); color: var(--error); }

  /* Session Expiry Timer */
  .session-expiry {
    display: none; align-items: center; gap: 8px;
    font-size: 11px; padding: 4px 12px;
    background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
    font-family: 'JetBrains Mono', monospace;
  }
  .session-expiry.show { display: flex; }
  .session-expiry .expiry-label { color: var(--text-muted); font-family: 'Sarabun', sans-serif; }
  .session-expiry .expiry-time { font-weight: 700; color: var(--success); }
  .session-expiry .expiry-time.warning { color: var(--warn); }
  .session-expiry .expiry-time.critical { color: var(--error); animation: blink 1s infinite; }
  .session-expiry .expiry-countdown { color: var(--text-muted); font-size: 10px; }
  @keyframes blink { 50% { opacity: 0.5; } }

  /* Summary cards */
  .summary-row {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px; padding: 20px 24px;
  }
  .summary-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px 20px;
  }
  .summary-card .label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .summary-card .value { font-size: 28px; font-weight: 700; }
  .summary-card .value.blue { color: var(--accent); }
  .summary-card .value.green { color: var(--success); }
  .summary-card .value.purple { color: var(--purple); }
  .summary-card .value.orange { color: var(--orange); }

  /* Toolbar */
  .toolbar {
    padding: 0 24px 12px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  .search-box {
    background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
    padding: 6px 12px; color: var(--text); font-size: 13px; width: 300px;
    font-family: 'Sarabun', sans-serif;
  }
  .search-box:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-glow); }
  .filter-select {
    background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
    padding: 6px 10px; color: var(--text); font-size: 12px; cursor: pointer;
    font-family: 'Sarabun', sans-serif;
  }
  .toolbar .count { font-size: 12px; color: var(--text-muted); margin-left: auto; }
  .btn-refresh {
    padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text); font-size: 12px;
    cursor: pointer; font-family: 'Sarabun', sans-serif; transition: all 0.15s;
  }
  .btn-refresh:hover { border-color: var(--primary); color: var(--accent); }
  .btn-export {
    padding: 6px 14px; border-radius: 6px; border: 1px solid var(--teal);
    background: rgba(57,211,83,0.1); color: var(--teal); font-size: 12px;
    cursor: pointer; font-family: 'Sarabun', sans-serif; transition: all 0.15s;
  }
  .btn-export:hover { background: rgba(57,211,83,0.2); }

  /* Groups Container */
  .groups-container {
    padding: 0 24px 24px;
    display: flex; flex-direction: column; gap: 16px;
  }

  /* Group Card */
  .group-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    overflow: hidden;
  }
  .group-header {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 20px; cursor: pointer; user-select: none;
    background: var(--surface); border-bottom: 1px solid transparent;
    transition: background 0.15s;
  }
  .group-header:hover { background: var(--surface2); }
  .group-header.open { border-bottom-color: var(--border); }
  .group-toggle {
    width: 20px; height: 20px; display: flex; align-items: center; justify-content: center;
    font-size: 12px; color: var(--text-muted); transition: transform 0.2s;
    flex-shrink: 0;
  }
  .group-header.open .group-toggle { transform: rotate(90deg); }
  .group-code {
    display: inline-block; padding: 2px 10px; border-radius: 4px;
    font-size: 11px; font-weight: 700; letter-spacing: 0.3px;
    background: var(--primary-glow); color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
  }
  .group-name { font-size: 14px; font-weight: 700; color: var(--text); }
  .group-stats {
    margin-left: auto; display: flex; align-items: center; gap: 16px;
    font-size: 11px; color: var(--text-muted); flex-shrink: 0;
  }
  .group-stats .stat-val { font-weight: 700; color: var(--accent); margin-left: 4px; }

  .group-body { display: none; }
  .group-body.open { display: block; }

  /* Sub Group Section */
  .subgroup-section { border-top: 1px solid var(--border); }
  .subgroup-section:first-child { border-top: none; }
  .subgroup-header {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 20px 8px 36px; cursor: pointer; user-select: none;
    background: rgba(188,140,255,0.03); transition: background 0.15s;
  }
  .subgroup-header:hover { background: rgba(188,140,255,0.07); }
  .subgroup-toggle {
    width: 16px; height: 16px; display: flex; align-items: center; justify-content: center;
    font-size: 10px; color: var(--text-muted); transition: transform 0.2s;
    flex-shrink: 0;
  }
  .subgroup-header.open .subgroup-toggle { transform: rotate(90deg); }
  .subgroup-name { font-size: 12px; font-weight: 600; color: var(--purple); }
  .subgroup-count { font-size: 10px; color: var(--text-muted); margin-left: auto; }
  .subgroup-body { display: none; }
  .subgroup-body.open { display: block; }

  /* Table inside group/subgroup */
  .group-table-wrap { overflow-x: auto; }
  table {
    width: 100%; border-collapse: collapse;
    font-size: 12px;
  }
  thead { background: var(--surface2); }
  th {
    padding: 8px 12px; text-align: left; font-weight: 700; font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.3px; color: var(--text-muted);
    border-bottom: 1px solid var(--border); white-space: nowrap;
    user-select: none; position: sticky; top: 0;
  }
  td {
    padding: 6px 12px; border-bottom: 1px solid var(--border);
    white-space: nowrap; max-width: 220px; overflow: hidden; text-overflow: ellipsis;
  }
  td.name-cell { max-width: 280px; font-weight: 500; }
  tr:hover td { background: rgba(31,111,235,0.05); }
  tr:last-child td { border-bottom: none; }

  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 4px;
    font-size: 10px; font-weight: 700; letter-spacing: 0.3px;
  }
  .badge-group { background: var(--primary-glow); color: var(--accent); }
  .price { font-family: 'JetBrains Mono', monospace; font-size: 11px; text-align: right; }

  /* Expand/Collapse All */
  .toggle-all-bar {
    padding: 0 24px 8px; display: flex; gap: 8px;
  }
  .btn-toggle-all {
    padding: 4px 12px; border-radius: 4px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text-muted); font-size: 11px;
    cursor: pointer; font-family: 'Sarabun', sans-serif; transition: all 0.15s;
  }
  .btn-toggle-all:hover { border-color: var(--accent); color: var(--accent); }

  /* Loading */
  .loading-overlay {
    display: none; position: fixed; inset: 0; background: rgba(13,17,23,0.8);
    z-index: 200; justify-content: center; align-items: center;
  }
  .loading-overlay.show { display: flex; }
  .spinner {
    width: 40px; height: 40px; border: 3px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Empty state */
  .empty-state {
    text-align: center; padding: 80px 20px; color: var(--text-muted);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.3; }
  .empty-state h3 { font-size: 16px; margin-bottom: 8px; color: var(--text); }

  /* Toast */
  .toast-container { position: fixed; top: 70px; right: 20px; z-index: 300; display: flex; flex-direction: column; gap: 8px; }
  .toast {
    padding: 10px 16px; border-radius: 8px; font-size: 12px; font-weight: 500;
    animation: slideIn 0.3s ease; min-width: 250px;
    border: 1px solid var(--border); background: var(--surface);
  }
  .toast.ok { border-color: rgba(63,185,80,0.3); background: var(--success-bg); color: var(--success); }
  .toast.err { border-color: rgba(248,81,73,0.3); background: var(--error-bg); color: var(--error); }
  @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

  /* Responsive */
  @media (max-width: 768px) {
    .summary-row { grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 12px 16px; }
    .toolbar { padding: 0 16px 10px; }
    .search-box { width: 100%; }
    .groups-container { padding: 0 12px 16px; }
    .group-header { flex-wrap: wrap; padding: 10px 14px; }
    .group-stats { margin-left: 0; width: 100%; padding-top: 6px; }
    .session-bar { flex-wrap: wrap; }
    .session-bar input { max-width: 100%; }
  }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-logo">
    <div class="logo-shield">L</div>
    <h1>Lab Items Dashboard</h1>
  </div>
  <span class="header-subtitle">HOSxP Lab Management</span>
  <div class="header-spacer"></div>
  <div class="user-info-bar" id="userInfoBar">
    <span>Not connected</span>
  </div>
</div>

<!-- Session Bar -->
<div class="session-bar">
  <label>BMS Session ID:</label>
  <input type="text" id="sessionId" placeholder="Enter BMS Session ID (GUID format)">
  <button id="connectBtn" onclick="handleConnect()">Connect</button>
  <div class="session-expiry" id="sessionExpiry">
    <span class="expiry-label">Session Expires:</span>
    <span class="expiry-time" id="expiryTime">--</span>
    <span class="expiry-countdown" id="expiryCountdown"></span>
  </div>
</div>

<!-- Summary Cards -->
<div class="summary-row" id="summaryRow" style="display:none">
  <div class="summary-card">
    <div class="label">Total Lab Items</div>
    <div class="value blue" id="totalItems">0</div>
  </div>
  <div class="summary-card">
    <div class="label">Groups</div>
    <div class="value green" id="totalGroups">0</div>
  </div>
  <div class="summary-card">
    <div class="label">Sub Groups</div>
    <div class="value purple" id="totalSubGroups">0</div>
  </div>
  <div class="summary-card">
    <div class="label">Has Price</div>
    <div class="value orange" id="totalWithPrice">0</div>
  </div>
</div>

<!-- Toolbar -->
<div class="toolbar" id="toolbar" style="display:none">
  <input type="text" class="search-box" id="searchBox" placeholder="Search lab items, code, group..." oninput="applyFilters()">
  <select class="filter-select" id="groupFilter" onchange="applyFilters()">
    <option value="">All Groups</option>
  </select>
  <select class="filter-select" id="subGroupFilter" onchange="applyFilters()">
    <option value="">All Sub Groups</option>
  </select>
  <button class="btn-refresh" onclick="fetchData()">Refresh</button>
  <button class="btn-export" onclick="exportCsv()">Export CSV</button>
  <span class="count" id="rowCount"></span>
</div>

<!-- Empty State -->
<div class="empty-state" id="emptyState">
  <div class="icon">&#x1F9EA;</div>
  <h3>Lab Items Dashboard</h3>
  <p>Connect your BMS Session to load lab items data</p>
</div>

<!-- Toggle All + Groups -->
<div class="toggle-all-bar" id="toggleAllBar" style="display:none">
  <button class="btn-toggle-all" onclick="toggleAllGroups(true)">Expand All</button>
  <button class="btn-toggle-all" onclick="toggleAllGroups(false)">Collapse All</button>
</div>
<div class="groups-container" id="groupsContainer"></div>

<!-- Loading -->
<div class="loading-overlay" id="loading">
  <div style="text-align:center">
    <div class="spinner"></div>
    <div style="margin-top:16px; color:var(--text-muted); font-size:13px">Loading lab items...</div>
  </div>
</div>

<!-- Toast -->
<div class="toast-container" id="toastContainer"></div>

<script>
// == State ==
let sessionConnected = false;
let sessionData = null;
let connectionConfig = null;
let userInfo = null;
let allData = [];
let filteredData = [];
let sortCol = '';
let sortAsc = true;
let expiryTimerId = null;
let sessionExpiryDate = null;
let sessionConnectedAt = null;

const LAB_ITEMS_SQL = `SELECT i.lab_items_group,g.lab_items_group_name,i.active_status,i.display_order,sg.lab_items_sub_group_name as gr,i.lab_items_name,
i.ecode,i.lab_items_code,n.billcode,i.tmlt_code,i.loinc_code,i.lab_items_unit,lab_items_normal_value,
si.specimen_name,n.price,n.price2,n.price3
 FROM lab_items i
LEFT JOIN nondrugitems n on n.icode = i.icode
LEFT JOIN lab_items_group g on g.lab_items_group_code = i.lab_items_group
LEFT JOIN lab_specimen_items si on si.specimen_code=i.specimen_code
LEFT JOIN lab_items_sub_group_list sl on sl.lab_items_code = i.lab_items_code
left join lab_items_sub_group sg on sg.lab_items_sub_group_code = sl.lab_items_sub_group_code
where i.active_status = 'Y'
ORDER BY i.lab_items_group,sg.lab_items_sub_group_code,i.display_order`;

// == Utilities ==
function minifySql(sql) {
  return sql.replace(/--.*$/gm, '').replace(/\/\*[\s\S]*?\*\//g, '').replace(/\s+/g, ' ').trim();
}

function extractConnectionConfig(data) {
  const result = data.result || {};
  const keyValue = result.key_value || {};
  const userInfoData = result.user_info || {};
  const apiUrl = keyValue['hosxp.api_url'] || userInfoData['hosxp.api_url'] || userInfoData.bms_url || '';
  const apiAuthKey = keyValue['hosxp.api_auth_key'] || userInfoData['hosxp.api_auth_key'] || userInfoData.bms_session_code || '';
  return { apiUrl, apiAuthKey };
}

function showToast(type, msg) {
  const container = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  container.appendChild(t);
  setTimeout(() => t.remove(), 4000);
}

function formatPrice(val) {
  if (val === null || val === undefined || val === '') return '-';
  const n = parseFloat(val);
  return isNaN(n) ? '-' : n.toLocaleString('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// == Session Expiry ==
function extractSessionExpiry(data) {
  if (!data || !data.result) return null;
  const r = data.result;
  // Check common expiry fields from PasteJSON response
  const candidates = [
    r.expired_at, r.expire_at, r.ExpiredDate, r.expire_date,
    r.end_datetime, r.expiry, r.ttl_date,
    r.key_value?.expired_at, r.key_value?.ExpiredDate,
    r.user_info?.expired_at, r.user_info?.ExpiredDate
  ];
  for (const val of candidates) {
    if (val) {
      const d = new Date(val);
      if (!isNaN(d.getTime())) return d;
    }
  }
  // Check TTL in seconds
  const ttlCandidates = [r.ttl, r.TTL, r.expire_seconds, r.key_value?.ttl];
  for (const val of ttlCandidates) {
    if (val && !isNaN(parseInt(val))) {
      return new Date(Date.now() + parseInt(val) * 1000);
    }
  }
  return null;
}

function startExpiryTimer() {
  stopExpiryTimer();
  const el = document.getElementById('sessionExpiry');
  const timeEl = document.getElementById('expiryTime');
  const countdownEl = document.getElementById('expiryCountdown');

  if (!sessionExpiryDate) {
    // No expiry data from API - show connected time only
    el.classList.add('show');
    document.querySelector('#sessionExpiry .expiry-label').textContent = 'Connected:';
    expiryTimerId = setInterval(() => {
      if (!sessionConnectedAt) return;
      const elapsed = Date.now() - sessionConnectedAt.getTime();
      timeEl.textContent = formatDuration(elapsed);
      timeEl.className = 'expiry-time';
      countdownEl.textContent = `since ${sessionConnectedAt.toLocaleTimeString('th-TH')}`;
    }, 1000);
    // Trigger first update immediately
    const elapsed = Date.now() - sessionConnectedAt.getTime();
    timeEl.textContent = formatDuration(elapsed);
    timeEl.className = 'expiry-time';
    countdownEl.textContent = `since ${sessionConnectedAt.toLocaleTimeString('th-TH')}`;
    return;
  }

  // Has expiry data - show countdown
  el.classList.add('show');
  document.querySelector('#sessionExpiry .expiry-label').textContent = 'Session Expires:';

  function tick() {
    const now = Date.now();
    const remaining = sessionExpiryDate.getTime() - now;

    if (remaining <= 0) {
      timeEl.textContent = 'EXPIRED';
      timeEl.className = 'expiry-time critical';
      countdownEl.textContent = '';
      stopExpiryTimer();
      showToast('err', 'Session has expired! Please reconnect.');
      return;
    }

    timeEl.textContent = formatDuration(remaining);
    countdownEl.textContent = `until ${sessionExpiryDate.toLocaleString('th-TH')}`;

    // Color based on remaining time
    if (remaining < 5 * 60 * 1000) {
      timeEl.className = 'expiry-time critical';
    } else if (remaining < 30 * 60 * 1000) {
      timeEl.className = 'expiry-time warning';
    } else {
      timeEl.className = 'expiry-time';
    }
  }

  tick();
  expiryTimerId = setInterval(tick, 1000);
}

function stopExpiryTimer() {
  if (expiryTimerId) {
    clearInterval(expiryTimerId);
    expiryTimerId = null;
  }
}

function formatDuration(ms) {
  const totalSec = Math.floor(Math.abs(ms) / 1000);
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;
  if (h > 0) return `${h}h ${String(m).padStart(2,'0')}m ${String(s).padStart(2,'0')}s`;
  return `${m}m ${String(s).padStart(2,'0')}s`;
}

// == Cookie Helpers ==
const SESSION_COOKIE_NAME = 'bms-session-id';
const SESSION_COOKIE_DAYS = 7;

function getSessionCookie() {
  const match = document.cookie.match(new RegExp('(?:^|; )' + SESSION_COOKIE_NAME.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '=([^;]*)'));
  return match ? decodeURIComponent(match[1]) : null;
}

function setSessionCookie(sessionId) {
  const expires = new Date(Date.now() + SESSION_COOKIE_DAYS * 864e5).toUTCString();
  const secure = location.protocol === 'https:' ? '; Secure' : '';
  document.cookie = `${SESSION_COOKIE_NAME}=${encodeURIComponent(sessionId)}; expires=${expires}; path=/${secure}; SameSite=Lax`;
}

function removeSessionCookie() {
  document.cookie = `${SESSION_COOKIE_NAME}=; expires=Thu, 01 Jan 1970 00:00:00 GMT; path=/`;
}

// == Init ==
function init() {
  // Priority 1: URL parameter
  const urlParams = new URLSearchParams(window.location.search);
  const urlSessionId = urlParams.get('bms-session-id');
  if (urlSessionId) {
    document.getElementById('sessionId').value = urlSessionId;
    setSessionCookie(urlSessionId);
    const url = new URL(window.location);
    url.searchParams.delete('bms-session-id');
    window.history.replaceState({}, '', url);
    handleConnect();
    return;
  }

  // Priority 2: Cookie
  const cookieSessionId = getSessionCookie();
  if (cookieSessionId) {
    document.getElementById('sessionId').value = cookieSessionId;
    handleConnect();
  }
}

// == Session ==
async function validateSession(sessionId) {
  try {
    const url = `https://hosxp.net/phapi/PasteJSON?Action=GET&code=${encodeURIComponent(sessionId)}`;
    const res = await fetch(url, { signal: AbortSignal.timeout(30000) });
    return await res.json();
  } catch (e) {
    return { MessageCode: 0, Message: 'Connection Error', error: e.message };
  }
}

async function handleConnect() {
  if (sessionConnected) {
    disconnectSession();
    return;
  }
  const sessionId = document.getElementById('sessionId').value.trim();
  if (!sessionId) { showToast('err', 'Please enter a Session ID'); return; }

  const btn = document.getElementById('connectBtn');
  btn.textContent = 'Connecting...';

  sessionData = await validateSession(sessionId);

  if (!sessionData || sessionData.MessageCode !== 200) {
    const errMsg = sessionData?.MessageCode === 500
      ? 'Session expired - please re-login to HOSxP'
      : sessionData?.Message || 'Failed to validate session';
    showToast('err', errMsg);
    btn.textContent = 'Connect';
    sessionData = null;
    return;
  }

  connectionConfig = extractConnectionConfig(sessionData);
  userInfo = sessionData.result?.user_info || {};

  if (!connectionConfig.apiUrl) {
    showToast('err', 'No API URL found in session data');
    btn.textContent = 'Connect';
    sessionData = null;
    connectionConfig = null;
    return;
  }

  sessionConnected = true;
  sessionConnectedAt = new Date();
  setSessionCookie(sessionId); // Save to cookie for auto-reconnect
  btn.textContent = 'Disconnect';
  btn.classList.add('connected');

  // Extract and start session expiry timer
  sessionExpiryDate = extractSessionExpiry(sessionData);
  startExpiryTimer();

  const infoBar = document.getElementById('userInfoBar');
  infoBar.classList.add('connected');
  infoBar.innerHTML = `<span class="user-name">${escapeHtml(userInfo.name || 'Unknown')}</span> <span>${escapeHtml(userInfo.location || '')}</span>`;

  showToast('ok', `Connected: ${userInfo.name || 'OK'} @ ${userInfo.location || ''}`);
  fetchData();
}

function disconnectSession() {
  sessionConnected = false;
  sessionData = null;
  connectionConfig = null;
  userInfo = null;
  allData = [];
  filteredData = [];
  sessionExpiryDate = null;
  sessionConnectedAt = null;
  stopExpiryTimer();
  removeSessionCookie(); // Clear cookie on disconnect

  const btn = document.getElementById('connectBtn');
  btn.textContent = 'Connect';
  btn.classList.remove('connected');

  document.getElementById('sessionExpiry').classList.remove('show');

  const infoBar = document.getElementById('userInfoBar');
  infoBar.classList.remove('connected');
  infoBar.innerHTML = '<span>Not connected</span>';

  document.getElementById('summaryRow').style.display = 'none';
  document.getElementById('toolbar').style.display = 'none';
  document.getElementById('toggleAllBar').style.display = 'none';
  document.getElementById('groupsContainer').innerHTML = '';
  document.getElementById('emptyState').style.display = '';

  showToast('ok', 'Disconnected');
}

// == Fetch Data ==
async function fetchData() {
  if (!sessionConnected) { showToast('err', 'Not connected'); return; }

  document.getElementById('loading').classList.add('show');

  const minified = minifySql(LAB_ITEMS_SQL);
  const url = `${connectionConfig.apiUrl}/api/sql?sql=${encodeURIComponent(minified)}&app=BMS.LabItems.Dashboard`;

  try {
    const res = await fetch(url, {
      method: 'GET',
      headers: { 'Authorization': `Bearer ${connectionConfig.apiAuthKey}` },
      signal: AbortSignal.timeout(60000)
    });

    const data = await res.json();
    document.getElementById('loading').classList.remove('show');

    if (data.MessageCode !== 200) {
      showToast('err', `Error: ${data.Message || 'Unknown error'}`);
      return;
    }

    allData = data.data || [];
    showToast('ok', `Loaded ${allData.length} lab items`);
    buildFilters();
    applyFilters();
    updateSummary();

    document.getElementById('summaryRow').style.display = '';
    document.getElementById('toolbar').style.display = '';
    document.getElementById('toggleAllBar').style.display = '';
    document.getElementById('emptyState').style.display = 'none';

  } catch (e) {
    document.getElementById('loading').classList.remove('show');
    showToast('err', `Fetch error: ${e.message}`);
  }
}

// == Summary ==
function updateSummary() {
  document.getElementById('totalItems').textContent = allData.length.toLocaleString();

  const groups = new Set(allData.map(r => r.lab_items_group).filter(Boolean));
  document.getElementById('totalGroups').textContent = groups.size;

  const subGroups = new Set(allData.map(r => r.gr).filter(Boolean));
  document.getElementById('totalSubGroups').textContent = subGroups.size;

  const withPrice = allData.filter(r => r.price && parseFloat(r.price) > 0).length;
  document.getElementById('totalWithPrice').textContent = withPrice.toLocaleString();
}

// == Filters ==
function buildFilters() {
  const groupSelect = document.getElementById('groupFilter');
  const subGroupSelect = document.getElementById('subGroupFilter');

  const groups = [...new Set(allData.map(r => r.lab_items_group_name).filter(Boolean))].sort();
  const subGroups = [...new Set(allData.map(r => r.gr).filter(Boolean))].sort();

  groupSelect.innerHTML = '<option value="">All Groups</option>' +
    groups.map(g => `<option value="${escapeHtml(g)}">${escapeHtml(g)}</option>`).join('');

  subGroupSelect.innerHTML = '<option value="">All Sub Groups</option>' +
    subGroups.map(g => `<option value="${escapeHtml(g)}">${escapeHtml(g)}</option>`).join('');
}

function applyFilters() {
  const search = document.getElementById('searchBox').value.toLowerCase().trim();
  const groupVal = document.getElementById('groupFilter').value;
  const subGroupVal = document.getElementById('subGroupFilter').value;

  filteredData = allData.filter(row => {
    if (groupVal && row.lab_items_group_name !== groupVal) return false;
    if (subGroupVal && row.gr !== subGroupVal) return false;
    if (search) {
      const haystack = [
        row.lab_items_name, row.lab_items_code, row.ecode, row.billcode,
        row.lab_items_group_name, row.gr, row.specimen_name, row.tmlt_code, row.loinc_code
      ].filter(Boolean).join(' ').toLowerCase();
      if (!haystack.includes(search)) return false;
    }
    return true;
  });

  renderGroupedView();
  document.getElementById('rowCount').textContent = `${filteredData.length} / ${allData.length} items`;
}

// == Build Grouped Structure ==
function buildGroupedData(data) {
  const groupMap = new Map();
  data.forEach(row => {
    const gKey = row.lab_items_group || '_none';
    const gName = row.lab_items_group_name || 'Ungrouped';
    if (!groupMap.has(gKey)) {
      groupMap.set(gKey, { code: gKey, name: gName, subgroups: new Map(), noSubgroup: [] });
    }
    const group = groupMap.get(gKey);
    const sgName = row.gr || '';
    if (sgName) {
      if (!group.subgroups.has(sgName)) group.subgroups.set(sgName, []);
      group.subgroups.get(sgName).push(row);
    } else {
      group.noSubgroup.push(row);
    }
  });
  return groupMap;
}

function makeTableHtml(rows) {
  let html = `<div class="group-table-wrap"><table>
    <thead><tr>
      <th>Lab Item Name</th>
      <th>Code</th>
      <th>E-Code</th>
      <th>Bill Code</th>
      <th>TMLT</th>
      <th>LOINC</th>
      <th>Unit</th>
      <th>Normal Value</th>
      <th>Specimen</th>
      <th style="text-align:right">Price</th>
      <th style="text-align:right">Price2</th>
      <th style="text-align:right">Price3</th>
      <th>Order</th>
    </tr></thead><tbody>`;
  rows.forEach(row => {
    html += `<tr>
      <td class="name-cell" title="${escapeHtml(row.lab_items_name)}">${escapeHtml(row.lab_items_name)}</td>
      <td><code>${escapeHtml(row.lab_items_code)}</code></td>
      <td>${escapeHtml(row.ecode)}</td>
      <td>${escapeHtml(row.billcode)}</td>
      <td>${escapeHtml(row.tmlt_code)}</td>
      <td>${escapeHtml(row.loinc_code)}</td>
      <td>${escapeHtml(row.lab_items_unit)}</td>
      <td title="${escapeHtml(row.lab_items_normal_value)}">${escapeHtml(row.lab_items_normal_value)}</td>
      <td>${escapeHtml(row.specimen_name)}</td>
      <td class="price">${formatPrice(row.price)}</td>
      <td class="price">${formatPrice(row.price2)}</td>
      <td class="price">${formatPrice(row.price3)}</td>
      <td style="text-align:center">${row.display_order ?? ''}</td>
    </tr>`;
  });
  html += '</tbody></table></div>';
  return html;
}

// == Render Grouped View ==
function renderGroupedView() {
  const container = document.getElementById('groupsContainer');
  const grouped = buildGroupedData(filteredData);

  if (grouped.size === 0) {
    container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted)">No matching items</div>';
    return;
  }

  let html = '';
  let gIdx = 0;
  grouped.forEach((group, gKey) => {
    const totalItems = group.noSubgroup.length +
      [...group.subgroups.values()].reduce((s, arr) => s + arr.length, 0);
    const subgroupCount = group.subgroups.size;
    const hasPrice = [...group.subgroups.values()].flat().concat(group.noSubgroup)
      .filter(r => r.price && parseFloat(r.price) > 0).length;

    html += `<div class="group-card" id="group-${gIdx}">`;
    html += `<div class="group-header open" onclick="toggleGroup(${gIdx})">
      <span class="group-toggle">&#9654;</span>
      <span class="group-code">${escapeHtml(group.code)}</span>
      <span class="group-name">${escapeHtml(group.name)}</span>
      <div class="group-stats">
        <span>Items:<span class="stat-val">${totalItems}</span></span>
        ${subgroupCount > 0 ? `<span>Sub Groups:<span class="stat-val">${subgroupCount}</span></span>` : ''}
        <span>Has Price:<span class="stat-val">${hasPrice}</span></span>
      </div>
    </div>`;
    html += `<div class="group-body open" id="group-body-${gIdx}">`;

    // Items without subgroup
    if (group.noSubgroup.length > 0) {
      html += makeTableHtml(group.noSubgroup);
    }

    // Subgroups
    let sgIdx = 0;
    group.subgroups.forEach((rows, sgName) => {
      const sgId = `sg-${gIdx}-${sgIdx}`;
      html += `<div class="subgroup-section">`;
      html += `<div class="subgroup-header open" onclick="toggleSubgroup('${sgId}')">
        <span class="subgroup-toggle">&#9654;</span>
        <span class="subgroup-name">${escapeHtml(sgName)}</span>
        <span class="subgroup-count">${rows.length} items</span>
      </div>`;
      html += `<div class="subgroup-body open" id="${sgId}">`;
      html += makeTableHtml(rows);
      html += '</div></div>';
      sgIdx++;
    });

    html += '</div></div>';
    gIdx++;
  });

  container.innerHTML = html;
}

// == Toggle Groups/Subgroups ==
function toggleGroup(idx) {
  const header = document.querySelector(`#group-${idx} .group-header`);
  const body = document.getElementById(`group-body-${idx}`);
  header.classList.toggle('open');
  body.classList.toggle('open');
}

function toggleSubgroup(id) {
  const body = document.getElementById(id);
  const header = body.previousElementSibling;
  header.classList.toggle('open');
  body.classList.toggle('open');
}

function toggleAllGroups(expand) {
  document.querySelectorAll('.group-header').forEach(h => {
    expand ? h.classList.add('open') : h.classList.remove('open');
  });
  document.querySelectorAll('.group-body').forEach(b => {
    expand ? b.classList.add('open') : b.classList.remove('open');
  });
  document.querySelectorAll('.subgroup-header').forEach(h => {
    expand ? h.classList.add('open') : h.classList.remove('open');
  });
  document.querySelectorAll('.subgroup-body').forEach(b => {
    expand ? b.classList.add('open') : b.classList.remove('open');
  });
}

// == Export CSV ==
function exportCsv() {
  if (!filteredData.length) { showToast('err', 'No data to export'); return; }

  const headers = ['Group','Group Name','Sub Group','Lab Item Name','Code','E-Code','Bill Code','TMLT','LOINC','Unit','Normal Value','Specimen','Price','Price2','Price3','Order'];
  const keys = ['lab_items_group','lab_items_group_name','gr','lab_items_name','lab_items_code','ecode','billcode','tmlt_code','loinc_code','lab_items_unit','lab_items_normal_value','specimen_name','price','price2','price3','display_order'];

  let csv = '\uFEFF' + headers.join(',') + '\n';
  filteredData.forEach(row => {
    csv += keys.map(k => {
      let v = row[k] ?? '';
      v = String(v).replace(/"/g, '""');
      return `"${v}"`;
    }).join(',') + '\n';
  });

  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = `lab-items-${new Date().toISOString().slice(0,10)}.csv`;
  link.click();
  URL.revokeObjectURL(link.href);
  showToast('ok', `Exported ${filteredData.length} rows`);
}

// == Start ==
init();
</script>
